services:
  - type: web
    name: smart-attendance-backend
    env: python
    rootDir: backend/attendance_system
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash render_start.sh
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

      # Add this in Render when you create/attach a PostgreSQL database:
      # - key: DATABASE_URL
      #   value: postgresql://user:password@host:5432/dbname
